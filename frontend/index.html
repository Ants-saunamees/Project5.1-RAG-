<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechCorp AI Assistant</title>

    <style>
        body {
            margin: 0;
            background: #eef1f5;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .chat-container {
            width: 100%;
            max-width: 750px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.12);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 26px;
            font-weight: 600;
            color: #2d2d2d;
        }

        .chat-box {
            height: 480px;
            overflow-y: auto;
            padding: 15px;
            border: 1px solid #dcdcdc;
            border-radius: 12px;
            background: #fafafa;
        }

        .msg {
            display: flex;
            margin: 12px 0;
        }

        .user-msg {
            justify-content: flex-end;
        }

        .ai-msg {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.45;
        }

        .user-msg .bubble {
            background: #0078ff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-msg .bubble {
            background: #e7e9ee;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .loading {
            opacity: 0.7;
            font-style: italic;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        input, select {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            padding: 12px 20px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
        }

        button:hover {
            background: #005fcc;
        }
    </style>
</head>

<body>
<div class="chat-container">
    <h2 class="title">TechCorp AI Assistant</h2>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input id="question" type="text" placeholder="Ask something..." autocomplete="off">
        <select id="department">
            <option value="">All Departments</option>
            <option value="engineering">Engineering</option>
            <option value="support">Support</option>
            <option value="hr">HR</option>
        </select>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const questionInput = document.getElementById("question");
    const departmentInput = document.getElementById("department");
    const chatBox = document.getElementById("chat-box");

    const question = questionInput.value.trim();
    const department = departmentInput.value || null;

    if (!question) return;

    // Show user message
    chatBox.innerHTML += `
        <div class="msg user-msg">
            <div class="bubble">${question}</div>
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    questionInput.value = "";

    // Loading bubble
    const loadingId = "loading-" + Date.now();
    chatBox.innerHTML += `
        <div class="msg ai-msg" id="${loadingId}">
            <div class="bubble loading">Thinking...</div>
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    // Send to backend
    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, department })
    });

    const data = await response.json();

    // Replace loading bubble
    document.getElementById(loadingId).innerHTML = `
        <div class="bubble">${data.answer}</div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
